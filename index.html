<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DU Airlines — Exact Site Preview</title>
  <style>
    html,body{margin:0;height:100%;background:#111;font-family:Arial,sans-serif}
    #bar{
      height:48px;display:flex;align-items:center;justify-content:center;
      background:#111;color:#fff;font-size:13px;font-weight:700;
      letter-spacing:.04em;text-align:center;padding:0 14px
    }
    #site{width:100%;height:calc(100vh - 48px);border:0;background:#fff}
    #status{
      position:fixed;inset:48px 0 0;display:flex;align-items:center;
      justify-content:center;background:#f5f1e8;color:#0b5138;font-weight:800
    }
  </style>
</head>
<body>
  <div id="bar">EXACT CURRENT WEBSITE PREVIEW — ONLY EMAIL + INQUIRY FORM CHANGED — NOT DEPLOYED</div>
  <div id="status">Loading your exact GitHub website…</div>
  <iframe id="site" title="DU Airlines exact website preview"></iframe>

<script>
(async function () {
  const rawUrl = "https://raw.githubusercontent.com/Duairlines18/Eliteacademy/main/index.html";
  const newEmail = "coachdu@duairlineseliteacademy.com";

  const formCSS = `
  <style>
    .du-inquiry-section{
      padding:88px 20px;
      background:#f6f2e8;
      color:#17231d;
    }
    .du-inquiry-wrap{
      max-width:1100px;
      margin:0 auto;
      display:grid;
      grid-template-columns:.8fr 1.2fr;
      gap:30px;
      align-items:start;
    }
    .du-inquiry-intro,.du-inquiry-card{
      border-radius:24px;
      padding:34px;
    }
    .du-inquiry-intro{
      background:#073d29;
      color:white;
    }
    .du-inquiry-intro h2,.du-inquiry-card h2{
      margin:8px 0 12px;
      font-size:clamp(30px,4vw,48px);
      line-height:1.08;
    }
    .du-inquiry-intro p{color:#e7eee9;line-height:1.65}
    .du-inquiry-email{
      display:block;
      margin-top:22px;
      color:white;
      font-weight:800;
      overflow-wrap:anywhere;
    }
    .du-inquiry-card{
      background:white;
      border:1px solid #d9dfda;
      box-shadow:0 16px 44px rgba(0,0,0,.09);
    }
    .du-inquiry-eyebrow{
      color:#b18e3f;
      font-size:12px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
    }
    .du-inquiry-form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:24px;
    }
    .du-field-full{grid-column:1/-1}
    .du-inquiry-form label{
      display:block;
      margin-bottom:7px;
      color:#073d29;
      font-size:13px;
      font-weight:800;
    }
    .du-inquiry-form input,.du-inquiry-form textarea{
      width:100%;
      box-sizing:border-box;
      padding:14px 15px;
      border:1px solid #cbd4ce;
      border-radius:11px;
      background:white;
      color:#17231d;
      font:inherit;
    }
    .du-inquiry-form textarea{min-height:145px;resize:vertical}
    .du-inquiry-submit{
      grid-column:1/-1;
      border:0;
      border-radius:12px;
      padding:16px 20px;
      background:#0b5a3c;
      color:white;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
    }
    .du-form-note{
      grid-column:1/-1;
      margin:0;
      color:#66736b;
      font-size:12px;
      line-height:1.5;
    }
    @media(max-width:760px){
      .du-inquiry-wrap,.du-inquiry-form{grid-template-columns:1fr}
      .du-field-full,.du-inquiry-submit,.du-form-note{grid-column:1}
      .du-inquiry-section{padding:60px 14px}
      .du-inquiry-intro,.du-inquiry-card{padding:25px}
    }
  </style>`;

  const formHTML = `
  <section class="du-inquiry-section" id="inquiry-form">
    <div class="du-inquiry-wrap">
      <div class="du-inquiry-intro">
        <div class="du-inquiry-eyebrow">Get Started</div>
        <h2>Tell Coach Du about your athlete.</h2>
        <p>Complete this short form and Coach Du will personally review your athlete’s goals and recommend the best starting point.</p>
        <a class="du-inquiry-email" href="mailto:${newEmail}">${newEmail}</a>
      </div>

      <div class="du-inquiry-card">
        <div class="du-inquiry-eyebrow">Athlete Inquiry</div>
        <h2>Start your athlete’s journey</h2>

        <form class="du-inquiry-form"
          action="https://formsubmit.co/${newEmail}"
          method="POST">

          <input type="hidden" name="_subject" value="New DU Airlines Athlete Inquiry">
          <input type="hidden" name="_template" value="table">
          <input type="hidden" name="_captcha" value="true">
          <input type="text" name="_honey" style="display:none">

          <div>
            <label for="du-parent-name">Parent Full Name</label>
            <input id="du-parent-name" name="Parent Full Name" type="text" required>
          </div>

          <div>
            <label for="du-parent-email">Email</label>
            <input id="du-parent-email" name="Parent Email" type="email" required>
          </div>

          <div>
            <label for="du-phone">Phone Number</label>
            <input id="du-phone" name="Phone Number" type="tel" required>
          </div>

          <div>
            <label for="du-child-name">Child’s Full Name</label>
            <input id="du-child-name" name="Child Full Name" type="text" required>
          </div>

          <div>
            <label for="du-sport">Sport</label>
            <input id="du-sport" name="Sport" type="text"
              placeholder="Soccer, football, track..." required>
          </div>

          <div>
            <label for="du-start">Ideal Start Date</label>
            <input id="du-start" name="Ideal Start Date" type="text"
              placeholder="Example: August 5 or ASAP" required>
          </div>

          <div class="du-field-full">
            <label for="du-goals">Goals for Sports</label>
            <textarea id="du-goals" name="Athlete Goals and Notes"
              placeholder="Tell Coach Du what your athlete wants to improve, upcoming competitions, current challenges, or anything else he should know."
              required></textarea>
          </div>

          <button class="du-inquiry-submit" type="submit">Submit Athlete Inquiry</button>
          <p class="du-form-note">Submissions will be delivered to ${newEmail}. FormSubmit sends a one-time activation email after the first live submission.</p>
        </form>
      </div>
    </div>
  </section>`;

  try {
    let html = await fetch(rawUrl, {cache:"no-store"}).then(r => {
      if (!r.ok) throw new Error("Could not load GitHub file");
      return r.text();
    });

    // Replace the old email everywhere without changing any other content.
    html = html.replaceAll("duchenge28@gmail.com", newEmail);

    // Make the existing action buttons lead to the new inquiry form.
    html = html.replaceAll('href="#contact"', 'href="#inquiry-form"');

    // Add only the form styling.
    html = html.replace("</head>", formCSS + "\n</head>");

    // Insert the form immediately before the existing footer, preserving the site.
    if (/<footer[\s>]/i.test(html)) {
      html = html.replace(/<footer/i, formHTML + "\n<footer");
    } else {
      html = html.replace("</body>", formHTML + "\n</body>");
    }

    const frame = document.getElementById("site");
    frame.srcdoc = html;
    document.getElementById("status").remove();
  } catch (err) {
    document.getElementById("status").innerHTML =
      "The preview could not load the GitHub file.<br>Please check your internet connection and reopen this file.";
  }
})();
</script>
</body>
</html>
